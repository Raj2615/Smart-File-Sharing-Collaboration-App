name: smart_file_sharing
description: Offline-First Smart File Sharing & Collaboration App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1        # Riverpod for state management
  riverpod_annotation: ^2.3.5     # Code gen annotations

  # Local Storage
  hive: ^2.2.3                    # Lightweight offline database
  hive_flutter: ^1.1.0            # Flutter adapter for Hive

  # Connectivity
  connectivity_plus: ^5.0.2       # Detect online/offline status

  # UI Enhancements
  flutter_animate: ^4.5.0         # Smooth animations
  intl: ^0.19.0                   # Date formatting
  uuid: ^4.3.3                    # Generate unique IDs
  iconsax: ^0.0.8                 # Beautiful icon set

  # HTTP (for backend sync)
  http: ^1.2.1                    # REST API calls

dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1          # Hive TypeAdapter generator
  build_runner: ^2.4.9            # Code generation runner
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true